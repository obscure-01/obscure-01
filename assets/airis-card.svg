<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="100%" height="100%">
  <defs>
    <!-- Elite Typography Stack -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600&amp;family=Inter:wght@300;400;500;600&amp;family=JetBrains+Mono:wght@400;500&amp;display=swap');
    </style>

    <!-- Enterprise Cybersecurity Base (Navy to Deep Obsidian) -->
    <linearGradient id="cyberBase" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020612" />
      <stop offset="50%" stop-color="#061026" />
      <stop offset="100%" stop-color="#01030A" />
    </linearGradient>

    <!-- Soft Core Spotlight (Electric Indigo) -->
    <radialGradient id="spotlight" cx="15%" cy="15%" r="65%">
      <stop offset="0%" stop-color="#1E3A8A" stop-opacity="0.35" />
      <stop offset="100%" stop-color="#1E3A8A" stop-opacity="0" />
    </radialGradient>

    <!-- Scanning Edge Mist (Cyan) -->
    <radialGradient id="mistEdge" cx="85%" cy="95%" r="50%">
      <stop offset="0%" stop-color="#0891B2" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#0891B2" stop-opacity="0" />
    </radialGradient>

    <!-- AIris Authentic Gradients -->
    <linearGradient id="eyeBevel" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4" /> 
      <stop offset="50%" stop-color="#2563EB" /> 
      <stop offset="100%" stop-color="#06B6D4" /> 
    </linearGradient>
    <linearGradient id="irisGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#1E3A8A" />
    </linearGradient>
    <linearGradient id="xgboostGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#F97316" />
    </linearGradient>

    <!-- Refined Depth Filters -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.65" />
    </filter>
    <filter id="logoGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#0891B2" flood-opacity="0.2" />
    </filter>
    
    <!-- Mask to keep circuit lines perfectly inside the Iris -->
    <clipPath id="irisClip">
      <circle cx="18" cy="18" r="6.8" />
    </clipPath>
  </defs>

  <!-- ========================================== -->
  <!-- 1. CINEMATIC CANVAS (STRICT 400x200)       -->
  <!-- ========================================== -->
  <rect width="394" height="194" x="3" y="3" rx="16" fill="url(#cyberBase)" stroke="#0F172A" stroke-width="1.2"  />
  <rect width="394" height="194" x="3" y="3" rx="16" fill="url(#spotlight)" />
  <rect width="394" height="194" x="3" y="3" rx="16" fill="url(#mistEdge)" />

  <!-- Abstract Network Topology Background -->
  <g stroke="#38BDF8" stroke-opacity="0.025" stroke-width="1" fill="none">
    <path d="M-20 60 L 80 40 L 150 120 L 300 90 L 450 140" />
    <path d="M 50 180 L 120 130 L 250 160 L 420 110" />
    <circle cx="80" cy="40" r="1.5" fill="#38BDF8" opacity="0.05" />
    <circle cx="150" cy="120" r="2" fill="#38BDF8" opacity="0.04" />
    <circle cx="300" cy="90" r="1.5" fill="#38BDF8" opacity="0.06" />
    <circle cx="250" cy="160" r="1" fill="#38BDF8" opacity="0.03" />
  </g>

  <!-- ========================================== -->
  <!-- 2. BRAND ANCHOR                            -->
  <!-- ========================================== -->
  <g transform="translate(20, 20)">
    <!-- Elegant Glass Housing (Increased visual breathing space to 36x36) -->
    <rect width="36" height="36" rx="10" fill="rgba(255,255,255,0.015)" stroke="rgba(255,255,255,0.05)" stroke-width="1" filter="url(#logoGlow)" />
    <rect width="36" height="36" rx="10" fill="rgba(56, 189, 248, 0.03)" />
    
    <!-- Custom Vector AIris Eye Logo -->
    <g transform="translate(0, 0)">
      <!-- Outer Geometric Bevel -->
      <path d="M 2 18 C 10 7, 26 7, 34 18 C 26 29, 10 29, 2 18 Z" fill="url(#eyeBevel)" />
      <!-- Inner Dark Sclera -->
      <path d="M 4 18 C 11 10, 25 10, 32 18 C 25 26, 11 26, 4 18 Z" fill="#01030A" />
      
      <!-- Glowing Iris -->
      <circle cx="18" cy="18" r="6.8" fill="url(#irisGrad)" />
      
      <!-- Exact Circuit Nodes (Clipped exactly to the iris gradient) -->
      <g clip-path="url(#irisClip)" stroke="#06B6D4" stroke-width="0.5" fill="none">
        <path d="M 12 12 H 14 L 15 11 H 18" />
        <circle cx="12" cy="12" r="0.6" fill="#06B6D4" />
        
        <path d="M 10 15 H 14" />
        <circle cx="10" cy="15" r="0.6" fill="#06B6D4" />
        
        <path d="M 9 18 H 14" />
        
        <path d="M 11 21 H 13 L 14 22 H 17" />
        <circle cx="11" cy="21" r="0.6" fill="#06B6D4" />
        
        <path d="M 14 24 H 16 L 17 23" />
        <circle cx="14" cy="24" r="0.6" fill="#06B6D4" />
      </g>
      
      <!-- Deep Central Pupil -->
      <circle cx="18" cy="18" r="3.2" fill="#01030A" />
      
      <!-- Sharp White Optical Reflection -->
      <circle cx="20.2" cy="15.8" r="1.4" fill="#FFFFFF" />
    </g>
  </g>

  <!-- Iconic Typography -->
  <text x="68" y="37" font-family="'Playfair Display', serif" font-size="20" font-weight="600" fill="#FDFBF7" letter-spacing="0.5">AIris Security</text>
  <!-- Polished Tagline (Medium weight, more opacity, letter spacing) -->
  <text x="70" y="52" font-family="'Inter', sans-serif" font-size="7.5" font-weight="500" fill="#38BDF8" letter-spacing="1.5" text-transform="uppercase">Scan Beyond Signatures</text>

  <!-- ========================================== -->
  <!-- 3. THE STORY (DESCRIPTION)                 -->
  <!-- ========================================== -->
  <!-- Description Text (broken into two lines for rhythm) -->
  <text x="20" y="82" font-family="'Inter', sans-serif" font-size="11.5" font-weight="300" fill="#E2E8F0" letter-spacing="0.2">Detects vulnerabilities, prioritizes risk, and guides</text>
  <text x="20" y="98" font-family="'Inter', sans-serif" font-size="11.5" font-weight="300" fill="#E2E8F0" letter-spacing="0.2">confident security decisions through actionable insights.</text>

  <!-- ========================================== -->
  <!-- 4. SUBDUED TECHNOLOGY ARTIFACTS            -->
  <!-- ========================================== -->
  <g transform="translate(20, 120)">
    
    <!-- React (Now perfectly optically balanced at full volume) -->
    <g transform="translate(0, 0)">
      <rect width="64" height="22" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
      <g transform="translate(11.5, 11) scale(0.95)">
        <g stroke="#61DAFB" stroke-width="1.2" fill="none">
          <ellipse rx="6.5" ry="2.5" transform="rotate(30)"/>
          <ellipse rx="6.5" ry="2.5" transform="rotate(90)"/>
          <ellipse rx="6.5" ry="2.5" transform="rotate(150)"/>
        </g>
        <circle r="1.5" fill="#61DAFB"/>
      </g>
      <text x="23" y="11" font-family="'JetBrains Mono', monospace" font-size="8" font-weight="500" fill="#94A3B8" dominant-baseline="central">React</text>
    </g>

    <!-- Next.js -->
    <g transform="translate(70, 0)">
      <rect width="72" height="22" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
      <g transform="translate(5.5, 4.5) scale(0.85)">
        <circle cx="7" cy="7" r="7" fill="#FFFFFF"/>
        <path d="M10 11.5 L5 5 L5 9 L4 9 L4 4 L5.5 4 L11.5 11 Z" fill="#000000"/>
        <path d="M10 5 L10 8 L9 8 L9 5 Z" fill="#000000"/>
      </g>
      <text x="21" y="11" font-family="'JetBrains Mono', monospace" font-size="8" font-weight="500" fill="#94A3B8" dominant-baseline="central">Next.js</text>
    </g>

    <!-- FastAPI -->
    <g transform="translate(148, 0)">
      <rect width="72" height="22" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
      <g transform="translate(5, 4.5) scale(0.85)">
        <circle cx="7" cy="7" r="7" fill="#05998B"/>
        <path d="M7 3 L4 8 L6.5 8 L6 11 L10.5 6 L8 6 Z" fill="#FFFFFF"/>
      </g>
      <text x="21" y="11" font-family="'JetBrains Mono', monospace" font-size="8" font-weight="500" fill="#94A3B8" dominant-baseline="central">FastAPI</text>
    </g>

    <!-- XGBoost -->
    <g transform="translate(226, 0)">
      <rect width="72" height="22" rx="6" fill="rgba(255,255,255,0.02)" stroke="rgba(255,255,255,0.06)" stroke-width="1" />
      <g transform="translate(5, 4.5) scale(0.85)">
        <path d="M2 2 L5 6 L2 12 L4 12 L6 8 L9 12 L12 12 L8 6 L12 2 L10 2 L6 5 L4 2 Z" fill="url(#xgboostGrad)"/>
      </g>
      <text x="21" y="11" font-family="'JetBrains Mono', monospace" font-size="8" font-weight="500" fill="#94A3B8" dominant-baseline="central">XGBoost</text>
    </g>
  </g>

  <!-- ========================================== -->
  <!-- 5. PRODUCT IDENTITY SIGNATURE              -->
  <!-- ========================================== -->
  <!-- Polished Identity Footer -->
  <text x="20" y="174" font-family="'Inter', sans-serif" font-size="9" font-weight="500" fill="#718096" letter-spacing="2.5" text-transform="uppercase">Analysis &#160;•&#160; Intelligence &#160;•&#160; Security</text>

</svg>
